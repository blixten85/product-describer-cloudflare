name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker: [app, processor, engine, token-rotator]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: ${{ matrix.worker }}
        run: npm install

      - name: Type-check
        working-directory: ${{ matrix.worker }}
        run: npx tsc --noEmit
