name: Copilot Review Reminder

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: write

jobs:
  remind:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MARKER: "<!-- copilot-review-reminder -->"
        run: |
          comments="$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate --jq '.[].body')"
          if printf '%s\n' "${comments}" | grep -Fq "${MARKER}"; then
            exit 0
          fi

          body="$(cat <<EOF
          ${MARKER}

          Tips: begär en GitHub Copilot-review för den här PR:n i GitHub UI/appen om du vill ha en AI-granskning innan merge.
          EOF
          )"

          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            -f body="${body}"
